<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="AwokeOS — A modern browser-based operating system">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AwokeOS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='44' font-family='system-ui' font-size='34' font-weight='700' text-anchor='middle' fill='white'%3EA%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="themes/themes.css">
</head>
<body data-theme="dark" data-accent="indigo">

    <!-- Boot / Loading screen -->
    <div id="boot-screen" class="boot-screen">
        <div class="boot-logo">
            <svg viewBox="0 0 64 64" width="80" height="80" aria-hidden="true">
                <defs>
                    <linearGradient id="bootg" x1="0" x2="1" y1="0" y2="1">
                        <stop offset="0" stop-color="var(--accent)"/>
                        <stop offset="1" stop-color="var(--accent-2)"/>
                    </linearGradient>
                </defs>
                <rect width="64" height="64" rx="14" fill="url(#bootg)"/>
                <text x="32" y="44" font-family="system-ui" font-size="34" font-weight="700" text-anchor="middle" fill="white">A</text>
            </svg>
            <h1 class="boot-title">AwokeOS</h1>
            <p class="boot-subtitle">v1.0</p>
        </div>
        <div class="boot-progress"><div class="boot-progress-bar" id="boot-progress-bar"></div></div>
        <p class="boot-status" id="boot-status">Booting kernel…</p>
    </div>

    <!-- Desktop environment (mounted by kernel) -->
    <div id="desktop" class="desktop hidden" aria-label="Desktop">
        <div class="desktop-wallpaper" id="desktop-wallpaper"></div>
        <div class="desktop-icons" id="desktop-icons"></div>
        <div class="desktop-selection" id="desktop-selection"></div>
    </div>

    <!-- Window layer (mounted by window manager) -->
    <div id="windows-layer" class="windows-layer" aria-label="Windows"></div>

    <!-- Notification toasts -->
    <div id="notifications" class="notifications" aria-live="polite"></div>

    <!-- Context menu layer -->
    <div id="context-menu-root"></div>

    <!-- Bottom taskbar -->
    <nav id="taskbar" class="taskbar hidden" aria-label="Taskbar"></nav>

    <!-- Start menu overlay -->
    <div id="start-menu-root"></div>

    <!-- Quick settings / control center overlay -->
    <div id="quick-settings-root"></div>

    <!-- Notification center overlay -->
    <div id="notification-center-root"></div>

    <!-- Search overlay -->
    <div id="search-root"></div>

    <!-- Lock screen -->
    <div id="lock-screen" class="lock-screen hidden">
        <div class="lock-time" id="lock-time">00:00</div>
        <div class="lock-date" id="lock-date">—</div>
        <button class="lock-unlock" id="lock-unlock" aria-label="Unlock">Click to unlock</button>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- Main module entry -->
    <script type="module" src="core/kernel.js"></script>
</body>
</html>
